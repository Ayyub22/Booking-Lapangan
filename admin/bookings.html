<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semua Booking — SportBook Admin</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar" id="adminSidebar"></aside>
    <main class="admin-main">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 class="page-header-title">📋 Semua Booking</h1>
          <p class="page-header-subtitle">Kelola dan pantau semua booking lapangan</p>
        </div>
        <button class="btn btn-outline btn-sm" id="exportBookingsBtn">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Export CSV
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar" style="margin-bottom:1.5rem;">
        <div class="search-input-wrapper" style="flex:1;min-width:200px;">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="searchBooking" class="search-input form-control" placeholder="Cari nama pelanggan, lapangan..." />
        </div>
        <select class="form-control" id="statusFilter" style="width:auto;font-size:0.8rem;padding:0.5rem 0.75rem;">
          <option value="all">Semua Status</option>
          <option value="pending">⏳ Menunggu</option>
          <option value="confirmed">✅ Dikonfirmasi</option>
          <option value="completed">🏁 Selesai</option>
          <option value="cancelled">❌ Dibatalkan</option>
        </select>
        <select class="form-control" id="fieldFilter" style="width:auto;font-size:0.8rem;padding:0.5rem 0.75rem;">
          <option value="all">Semua Lapangan</option>
        </select>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <input type="date" id="dateFrom" class="form-control" style="font-size:0.8rem;padding:0.5rem 0.75rem;" />
          <span style="color:var(--clr-text-muted);font-size:0.8rem;">–</span>
          <input type="date" id="dateTo" class="form-control" style="font-size:0.8rem;padding:0.5rem 0.75rem;" />
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="grid grid-4" style="margin-bottom:1.5rem;">
        <div style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:12px;padding:1rem;text-align:center;">
          <div style="font-size:1.5rem;font-weight:800;color:var(--clr-text);" id="countAll">-</div>
          <div style="font-size:0.75rem;color:var(--clr-text-muted);">Total</div>
        </div>
        <div style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:12px;padding:1rem;text-align:center;">
          <div style="font-size:1.5rem;font-weight:800;color:var(--clr-warning);" id="countPending">-</div>
          <div style="font-size:0.75rem;color:var(--clr-text-muted);">Menunggu</div>
        </div>
        <div style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:12px;padding:1rem;text-align:center;">
          <div style="font-size:1.5rem;font-weight:800;color:var(--clr-success);" id="countConfirmed">-</div>
          <div style="font-size:0.75rem;color:var(--clr-text-muted);">Dikonfirmasi</div>
        </div>
        <div style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:12px;padding:1rem;text-align:center;">
          <div style="font-size:1.5rem;font-weight:800;color:var(--clr-primary);" id="countCompleted">-</div>
          <div style="font-size:0.75rem;color:var(--clr-text-muted);">Selesai</div>
        </div>
      </div>

      <!-- Bookings Table -->
      <div class="card">
        <div class="card-body" style="padding:0;">
          <div id="bookingsTableContainer">
            <div class="page-loading" style="min-height:300px;"><div class="spinner"></div><span>Memuat data booking...</span></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Status Update Modal -->
  <div class="modal-overlay" id="statusModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">✏️ Update Status Booking</h2>
        <button class="modal-close" id="closeStatusModal">×</button>
      </div>
      <div class="modal-body">
        <div id="statusBookingInfo" style="margin-bottom:1.25rem;padding:1rem;background:var(--clr-surface-2);border-radius:10px;font-size:0.875rem;"></div>
        <div class="form-group">
          <label class="form-label">Status Baru</label>
          <select id="newStatus" class="form-control">
            <option value="pending">⏳ Menunggu</option>
            <option value="confirmed">✅ Dikonfirmasi</option>
            <option value="completed">🏁 Selesai</option>
            <option value="cancelled">❌ Dibatalkan</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelStatusBtn">Batal</button>
        <button class="btn btn-primary" id="saveStatusBtn">Simpan Status</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/admin/bookings.js"></script>
</body>
</html>
