<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — SportBook</title>
  <meta name="description" content="Buat akun SportBook dan mulai booking lapangan olahraga favoritmu hari ini." />
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <div class="auth-page">
    <!-- Left Panel -->
    <div class="auth-left">
      <div class="hero-orb hero-orb-1" style="opacity:0.2;width:400px;height:400px;top:-100px;left:-100px;"></div>
      <div class="hero-orb hero-orb-2" style="opacity:0.15;width:300px;height:300px;bottom:-80px;right:-80px;"></div>
      <div style="position:relative;z-index:1;text-align:center;max-width:400px;width:100%;">
        <a href="/index.html" class="navbar-brand" style="justify-content:center;margin-bottom:2.5rem;display:flex;">
          <div class="brand-icon" style="width:48px;height:48px;font-size:1.5rem;">⚽</div>
          <span style="font-size:1.5rem;">SportBook</span>
        </a>
        <h2 style="font-size:2rem;font-weight:800;margin-bottom:1rem;color:#f9fafb;">Bergabung dengan<br>SportBook!</h2>
        <p style="color:var(--clr-text-muted);line-height:1.7;">Daftar gratis dan dapatkan akses ke ratusan lapangan olahraga di sekitarmu.</p>
        <div style="margin-top:2.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
          <div style="background:rgba(16,185,129,0.1);backdrop-filter:blur(8px);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:1.5rem 1.25rem;text-align:center;">
            <div style="font-weight:800;font-size:1.75rem;color:var(--clr-primary);" id="featFields">10+</div>
            <div style="font-size:0.8rem;color:var(--clr-text-muted);font-weight:500;">Lapangan<br>Tersedia</div>
          </div>
          <div style="background:rgba(16,185,129,0.1);backdrop-filter:blur(8px);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:1.5rem 1.25rem;text-align:center;">
            <div style="font-weight:800;font-size:1.75rem;color:var(--clr-primary);">24/7</div>
            <div style="font-size:0.8rem;color:var(--clr-text-muted);font-weight:500;">Booking<br>Online</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-box animate-slide-up">
        <div style="margin-bottom:2rem;">
          <a href="/index.html" class="navbar-brand" style="display:flex;margin-bottom:1.5rem;">
            <div class="brand-icon">⚽</div>
            <span>SportBook</span>
          </a>
          <h1 class="auth-title">Buat Akun</h1>
          <p class="auth-subtitle">Sudah punya akun? <a href="/login.html" style="color:var(--clr-primary);font-weight:600;">Masuk di sini</a></p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="fullName" class="form-label">Nama Lengkap <span class="required">*</span></label>
            <div class="input-group">
              <svg class="input-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              <input type="text" id="fullName" class="form-control" placeholder="Nama Lengkap" required autocomplete="name" minlength="3" />
            </div>
          </div>
          <div class="form-group">
            <label for="phone" class="form-label">Nomor HP</label>
            <div class="input-group">
              <svg class="input-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
              <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxxxx" autocomplete="tel" />
            </div>
          </div>
          <div class="form-group">
            <label for="email" class="form-label">Email <span class="required">*</span></label>
            <div class="input-group">
              <svg class="input-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <input type="email" id="email" class="form-control" placeholder="nama@email.com" required autocomplete="email" />
            </div>
          </div>
          <div class="form-group">
            <label for="password" class="form-label">Password <span class="required">*</span></label>
            <div class="input-group">
              <svg class="input-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" id="password" class="form-control" placeholder="Min. 6 karakter" required minlength="6" autocomplete="new-password" />
            </div>
            <div class="form-hint">Minimal 6 karakter</div>
          </div>
          <div class="form-group">
            <label for="confirmPassword" class="form-label">Konfirmasi Password <span class="required">*</span></label>
            <div class="input-group">
              <svg class="input-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Ulangi password" required autocomplete="new-password" />
            </div>
          </div>
          <div id="registerError" class="form-error" style="display:none;margin-bottom:1rem;padding:0.75rem 1rem;background:rgba(239,68,68,0.1);border-radius:8px;border:1px solid rgba(239,68,68,0.2);"></div>
          <div id="registerSuccess" style="display:none;margin-bottom:1rem;padding:0.875rem 1rem;background:rgba(16,185,129,0.1);border-radius:8px;border:1px solid rgba(16,185,129,0.2);color:var(--clr-primary);font-size:0.875rem;font-weight:500;"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">Daftar Sekarang</button>
        </form>

        <div style="margin-top:1.5rem;text-align:center;color:var(--clr-text-muted);font-size:0.8rem;">
          Dengan mendaftar, kamu menyetujui <a href="#" style="color:var(--clr-primary);">Syarat & Ketentuan</a> kami.
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/register.js"></script>
</body>
</html>
